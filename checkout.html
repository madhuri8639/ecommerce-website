{% extends 'base.html' %}

{% block title %}Checkout - SmartBuy{% endblock %}

{% block content %}
<div class="checkout-container">
    <h2>Secure Checkout</h2>
    <div class="checkout-grid">
        <div class="checkout-form glass-card">
            <h3>Shipping Details</h3>
            <form method="POST" action="{{ url_for('checkout') }}">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" required class="form-control" placeholder="123 Main St">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" required class="form-control" placeholder="New York">
                    </div>
                    <div class="form-group">
                        <label>Zip Code</label>
                        <input type="text" required class="form-control" placeholder="10001">
                    </div>
                </div>
                <h3>Payment Info</h3>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" required class="form-control" placeholder="XXXX-XXXX-XXXX-XXXX">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" required class="form-control" placeholder="MM/YY">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" required class="form-control" placeholder="123">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">Confirm Payment & Place Order</button>
            </form>
        </div>
        
        <div class="checkout-summary glass-card">
            <h3>Order Total</h3>
            <p class="checkout-amount">${{ "%.2f"|format(total) }}</p>
            <p><i class="fa-solid fa-lock"></i> Secure SSL Checkout</p>
        </div>
    </div>
</div>
{% endblock %}
